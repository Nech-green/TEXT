<main class="M"><div class="P on" id="p-login"><div class="login-screen"><div style="font-size:40px">📊</div><h2>FinBoard</h2><p>דשבורד פיננסי אישי ועסקי<br>התחבר עם Google לסנכרון בין מכשירים</p><button class="login-btn" onclick="signIn()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">התחבר עם Google</button></div></div>

<div class="MO" id="rstM"><div class="MD"><h3>⚠️ איפוס</h3><p>כל הנתונים יימחקו.</p><div style="display:flex;gap:4px;justify-content:flex-end"><button class="B" onclick="$('rstM').classList.remove('op')">ביטול</button><button class="B Bd" onclick="resetAll()" style="background:var(--rdd)">מחק</button></div></div></div>

<script>
const $=id=>document.getElementById(id);
// ===== FIREBASE =====
firebase.initializeApp({apiKey:"AIzaSyD6juU66Z90OOLKmWFC3eio_o1s9HyB1aU",authDomain:"finboard-nech.firebaseapp.com",projectId:"finboard-nech",storageBucket:"finboard-nech.firebasestorage.app",messagingSenderId:"713113119743",appId:"1:713113119743:web:7f8af2dcec9c150c0ad5ca"});
const auth=firebase.auth(),db=firebase.firestore();let uid=null,unsub=null;
function signIn(){auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}
function togA(){uid?auth.signOut():signIn()}
auth.onAuthStateChanged(u=>{if(u){uid=u.uid;$('aB').textContent='התנתק';$('uI').textContent=u.displayName||'';$('sD').className='sd sd-on';$('nB').style.display='';$('p-login').classList.remove('on');startSync()}else{uid=null;$('aB').textContent='התחבר';$('uI').textContent='';$('sD').className='sd sd-off';$('nB').style.display='none';document.querySelectorAll('.P').forEach(p=>p.classList.remove('on'));$('p-login').classList.add('on');if(unsub){unsub();unsub=null}}});
function startSync(){if(unsub)unsub();unsub=db.collection('users').doc(uid).collection('data').doc('main').onSnapshot(s=>{if(s.exists){S=s.data();if(!S.incomes)S.incomes=[];if(!S.expenses)S.expenses=[];if(!S.transfers)S.transfers=[];if(!S.taxPayments)S.taxPayments=[];if(!S.deposits)S.deposits=[];if(!S.cats)S.cats=[...DEC];if(!S.months)S.months={};if(!S.accounts)S.accounts={};if(!S.taxConfig)S.taxConfig={nekudot:2.25,gender:'male',pensionMonthly:0,hashMonthly:0,autoDeposit:false};renderCur()}else{S=defState();cloudSave()}})}
async function cloudSave(){if(!uid)return;try{await db.collection('users').doc(uid).collection('data').doc('main').set(JSON.parse(JSON.stringify(S)));$('sD').style.background='var(--ac)';setTimeout(()=>$('sD').style.background='',400)}catch(e){console.error(e)}}
function save(){cloudSave()}
async function resetAll(){if(!uid)return;await db.collection('users').doc(uid).collection('data').doc('main').delete();S=defState();await cloudSave();$('rstM').classList.remove('op')}

// ===== CONFIG =====
const DEC=['עובר ושב','קרן כספית','פיקדון אישי','ביטוח ישיר - כללי','ביטוח ישיר - מניות','מיטב','מיטב טרייד','מנורה מבטחים - תגמולים ופיצויים','מנורה מבטחים - גמל להשקעה','הראל השתלמות','מנורה מבטחים השתלמות','פנסיה'];
const MRG={'מנורה מבטחים - תגמולים ופיצויים':'מנורה תגמולים','מנורה מבטחים - גמל להשקעה':'מנורה גמל','הראל השתלמות':'השתלמות','מנורה מבטחים השתלמות':'השתלמות'};
const SHN={'עובר ושב':'עו"ש','קרן כספית':'קרן כספית','פיקדון אישי':'פיקדון','ביטוח ישיר - כללי':'ביט.ישיר כללי','ביטוח ישיר - מניות':'ביט.ישיר מניות','מיטב':'מיטב','מיטב טרייד':'מיטב טרייד','מנורה תגמולים':'מנורה תגמולים','מנורה גמל':'מנורה גמל','השתלמות':'השתלמות','פנסיה':'פנסיה'};
const COL=['#e5a90a','#3fb950','#f85149','#58a6ff','#bc8cff','#f0883e','#3ddbd9','#f778ba','#79c0ff','#d2a8ff','#56d364'];
// Tax rates: 25% capital gains, 0% on hashtalamut (6yr+) and pension (60+)
const TXR={'קרן כספית':.25,'פיקדון אישי':.25,'ביטוח ישיר - כללי':.25,'ביטוח ישיר - מניות':.25,'מיטב':.25,'מיטב טרייד':.25,'מנורה תגמולים':.25,'מנורה גמל':.25,'השתלמות':0,'פנסיה':0,'עובר ושב':0};
const VAT=.17;

// ===== 2026 TAX BRACKETS (Economic Efficiency Law, retroactive Jan 1 2026) =====
const BRK=[
  {u:84120,r:.10},   // bracket 1 (frozen)
  {u:120720,r:.14},  // bracket 2 (frozen)
  {u:228000,r:.20},  // bracket 3 (expanded from 193,800)
  {u:301200,r:.31},  // bracket 4 (expanded from 269,280)
  {u:560280,r:.35},  // bracket 5 (expanded from same — actually was 560,280)
  {u:721560,r:.47},  // bracket 6 (frozen)
  {u:Infinity,r:.50} // surtax on active income: 47%+3%=50%
];
const SURTAX_THRESH=721560;
const NEKUDA_VAL=2904; // value per nekuda zikui point (2025-2027, frozen)

function calcIT(taxableIncome, nekudot){
  let tax=0,prev=0;
  for(const b of BRK){
    const x=Math.min(taxableIncome,b.u)-prev;
    if(x<=0)break;
    tax+=x*b.r;
    prev=b.u;
  }
  // Subtract nekudot zikui
  const credit=(nekudot||2.25)*NEKUDA_VAL;
  tax=Math.max(0,tax-credit);
  return tax;
}

// ===== NATIONAL INSURANCE 2026 (self-employed) =====
// Two-tier system: reduced rate up to 60% of average wage, full rate above
const NI_AVG_WAGE_2026=12536; // average wage estimate 2026
const NI_ANNUAL_60PCT=NI_AVG_WAGE_2026*0.6*12; // ~90,259
const NI_MAX_INCOME=NI_AVG_WAGE_2026*5*12; // max insurable income ~752,160

// Self-employed NI rates 2026 (bituach leumi + health tax combined)
const NI_RATE_LOW=0.0707+0.0312; // 7.07% NI + 3.12% health = 10.19% on income up to 60% avg
const NI_RATE_HIGH=0.1283+0.05;   // 12.83% NI + 5% health = 17.83% on income above 60% avg

function calcNI(annualIncome){
  if(annualIncome<=0)return 0;
  const inc=Math.min(annualIncome, NI_MAX_INCOME);
  const lowPortion=Math.min(inc, NI_ANNUAL_60PCT);
  const highPortion=Math.max(0, inc-NI_ANNUAL_60PCT);
  return lowPortion*NI_RATE_LOW + highPortion*NI_RATE_HIGH;
}

// ===== PENSION/HISHTALMUT TAX DEDUCTIONS =====
// Section 47: pension contributions deduction — up to 16.5% of qualifying income (capped)
// Section 45א: hishtalmut deduction — up to 4.5% of qualifying income (capped at ~293,397 for 2026)
const PENSION_DEDUCT_RATE=0.165; // max deductible pension %
const PENSION_CREDIT_RATE=0.35;  // 35% tax credit on 5.5% of qualifying income
const PENSION_CREDIT_PORTION=0.055;
const HASH_DEDUCT_RATE=0.045;   // hishtalmut deduction rate
const HASH_MAX_INCOME=293397;   // max qualifying income for hishtalmut deduction 2026

function calcPensionBenefit(annualPensionDeposit, taxableIncome){
  // Deduction: up to 11% of income
  const maxDeduct=taxableIncome*0.11;
  const deduction=Math.min(annualPensionDeposit, maxDeduct);
  // Credit: 35% on up to 5.5% of income
  const maxCreditBase=taxableIncome*PENSION_CREDIT_PORTION;
  const remainAfterDeduct=Math.max(0, annualPensionDeposit-deduction);
  const creditBase=Math.min(remainAfterDeduct, maxCreditBase);
  const credit=creditBase*PENSION_CREDIT_RATE;
  return {deduction, credit};
}

function calcHashBenefit(annualHashDeposit, taxableIncome){
  const qualIncome=Math.min(taxableIncome, HASH_MAX_INCOME);
  const maxDeduct=qualIncome*HASH_DEDUCT_RATE;
  return Math.min(annualHashDeposit, maxDeduct);
}

// ===== EXPENSE CATEGORIES (corrected per Israeli Tax Ordinance 2026) =====
const EXC=[
  {id:'rent',n:'שכירות משרד',rec:1,vat:1},
  {id:'computer',n:'ציוד/מחשב/תוכנות',rec:1,vat:1},
  {id:'internet',n:'טלפון/אינטרנט',rec:1,vat:1,p:.80},      // 80% deductible (was 50%)
  {id:'transport',n:'תחבורה',rec:1,vat:1},
  {id:'car',n:'רכב (דלק/ביטוח/טיפולים)',rec:1,vat:1,p:.45}, // NEW: 45% deductible, 2/3 VAT
  {id:'accounting',n:'רו"ח/עו"ד',rec:1,vat:1},
  {id:'bituach',n:'ביטוח לאומי',rec:1,vat:0},
  {id:'pension_exp',n:'הפקדת פנסיה',rec:1,vat:0},            // Tracked separately for 47/45א
  {id:'hash_exp',n:'הפקדת השתלמות',rec:1,vat:0},
  {id:'software',n:'מנויי תוכנה עסקיים',rec:1,vat:1},
  {id:'marketing',n:'פרסום/שיווק',rec:1,vat:1},
  {id:'office',n:'חומרי משרד',rec:1,vat:1},
  {id:'health_ins',n:'ביטוח בריאות',rec:1,vat:0},
  {id:'meals',n:'אוכל עסקי',rec:1,vat:0,p:.80},              // 80% deductible, no VAT deduction on meals
  {id:'home_office',n:'משרד ביתי (חלק יחסי)',rec:1,vat:1},    // NEW

function ks(){return Object.keys(S.months||{}).sort()}

function fp(n){if(n==null||isNaN(n)||!isFinite(n))return'—';return(n>0?'+':'')+n.toFixed(1)+'%'}

// ===== CORRECT RETURN CALCULATION =====
function acctReturn(cat){
  const ac=S.accounts[cat]||{dep:0};
  const K=ks();if(!K.length)return{val:0,dep:0,gain:0,ret:0,tax:0,net:0};
  const lastM=S.months[K[K.length-1]]||{};
  const val=toD(lastM)[cat]||0;
  const dep=ac.dep||0;
  const gain=dep>0?val-dep:0;
  const rate=TXR[cat]||0;
  const tax=gain>0?gain*rate:0;
  return{val,dep,gain,ret:dep>0?(gain/dep*100):0,tax,net:val-tax};
}

// ===== TAX (CORRECTED — 2026 brackets, proper NI, nekudot zikui, pension/hash deductions) =====
function renderTax(){
  const yr=new Date().getFullYear().toString();
  const yP=(S.taxPayments||[]).filter(p=>p.month&&p.month.startsWith(yr));
  const yI=(S.incomes||[]).filter(i=>i.month&&i.month.startsWith(yr));
  const yE=(S.expenses||[]).filter(e=>e.month&&e.month.startsWith(yr));
  const tc=S.taxConfig||{nekudot:2.25};
  
  const tI=yI.reduce((s,i)=>s+i.amount,0); // gross income incl VAT
  const incBeforeVAT=tI/(1+VAT);             // income before VAT
  
  // Recognized expenses (with partial deduction rates)
  const tRec=yE.filter(e=>{const c=EXC.find(x=>x.id===e.cat);return c&&c.rec})
    .reduce((s,e)=>{const c=EXC.find(x=>x.id===e.cat);return s+e.amount*(c.p||1)},0);
  const recBeforeVAT=tRec/(1+VAT);
  
  // Pension/hishtalmut deposits this year
  const pensionDeps=(S.deposits||[]).filter(d=>d.month&&d.month.startsWith(yr)&&d.type==='pension')
    .reduce((s,d)=>s+d.amount,0);
  const hashDeps=(S.deposits||[]).filter(d=>d.month&&d.month.startsWith(yr)&&d.type==='hishtalmut')
    .reduce((s,d)=>s+d.amount,0);
  
  // Also count pension/hash expenses from biz tab
  const pensionFromExp=yE.filter(e=>e.cat==='pension_exp').reduce((s,e)=>s+e.amount,0);
  const hashFromExp=yE.filter(e=>e.cat==='hash_exp').reduce((s,e)=>s+e.amount,0);
  const totalPension=pensionDeps+pensionFromExp;
  const totalHash=hashDeps+hashFromExp;
  
  // Taxable income: income - recognized expenses - pension deduction - hash deduction
  const baseIncome=incBeforeVAT-recBeforeVAT;
  const penBenefit=calcPensionBenefit(totalPension,baseIncome);
  const hashDeduct=calcHashBenefit(totalHash,baseIncome);
  const taxableIncome=Math.max(0, baseIncome-penBenefit.deduction-hashDeduct);
  
  // VAT calculation
  const outputVAT=tI*VAT/(1+VAT);
  const inputVAT=yE.filter(e=>{const c=EXC.find(x=>x.id===e.cat);return c&&c.vat})
    .reduce((s,e)=>{const c=EXC.find(x=>x.id===e.cat);
      let vatRate=VAT/(1+VAT);
      // Car expenses: 2/3 VAT deductible
      if(e.cat==='car') vatRate=vatRate*(2/3);
      return s+e.amount*(c.p||1)*vatRate;
    },0);
  const vE=outputVAT-inputVAT;
  
  // Income tax (2026 brackets with nekudot)
  const iE=calcIT(taxableIncome, tc.nekudot||2.25);
  // Subtract pension credit
  const iEAfterCredit=Math.max(0, iE-penBenefit.credit);
  
  // National Insurance (proper two-tier)
  const bE=calcNI(baseIncome);
  
  // Payments made
  const vP=yP.filter(p=>p.type==='vat').reduce((s,p)=>s+p.amount,0);
  const iP=yP.filter(p=>p.type==='income_adv'||p.type==='income_annual').reduce((s,p)=>s+p.amount,0);
  const bP=yP.filter(p=>p.type==='bituach_leumi').reduce((s,p)=>s+p.amount,0);
  
  const bc=v=>v>0?'dn':'up',bt=v=>v>0?'חובה':'זכות';
  const el=$('p-tax');
  
  el.innerHTML=`
  <div class="tip">
    <strong>🔄 מדרגות מס 2026:</strong> עודכנו לפי חוק ההתייעלות הכלכלית (מרץ 2026). מדרגות 3-5 הורחבו רטרואקטיבית מינואר 2026.<br>
    <strong>נק' זיכוי:</strong> ${tc.nekudot||2.25} נקודות = ${fmt((tc.nekudot||2.25)*NEKUDA_VAL)} זיכוי שנתי. ניתן לשנות בהגדרות הפקדות.
  </div>
  <div class="E"><div class="ET">🧾 מעקב מס — ${yr}</div><div class="ES">שולם בפועל מול הערכה. כולל ניכויים לפנסיה/השתלמות (סעיפים 47, 45א).</div></div>
  <div class="TX">
    <div class="TXC"><h4>🧾 מע"מ</h4>
      <div class="TXR"><span>מע"מ עסקאות</span><span>${fmt(outputVAT)}</span></div>
      <div class="TXR"><span>מע"מ תשומות</span><span class="up">${fmt(inputVAT)}</span></div>
      <div class="TXR"><span>הערכה</span><span>${fmt(vE)}</span></div>
      <div class="TXR"><span>שולם</span><span class="up">${fmt(vP)}</span></div>
      <div class="TXR"><span>יתרה</span><span class="${bc(vE-vP)}">${fmt(vE-vP)} (${bt(vE-vP)})</span></div>
    </div>
    <div class="TXC"><h4>📋 מס הכנסה</h4>
      <div class="TXR"><span>הכנסה לפני מע"מ</span><span>${fmt(incBeforeVAT)}</span></div>
      <div class="TXR"><span>הוצאות מוכרות</span><span>${fmt(recBeforeVAT)}</span></div>
      <div class="TXR"><span>ניכוי פנסיה (ס' 47)</span><span class="up">${fmt(penBenefit.deduction)}</span></div>
      <div class="TXR"><span>ניכוי השתלמות (ס' 45א)</span><span class="up">${fmt(hashDeduct)}</span></div>
      <div class="TXR"><span>הכנסה חייבת</span><span style="font-weight:700">${fmt(taxableIncome)}</span></div>
      <hr class="sep">
      <div class="TXR"><span>מס לפני זיכויים</span><span>${fmt(iE+penBenefit.credit)}</span></div>
      <div class="TXR"><span>זיכוי נק' (${tc.nekudot||2.25})</span><span class="up">${fmt((tc.nekudot||2.25)*NEKUDA_VAL)}</span></div>
      <div class="TXR"><span>זיכוי פנסיה 35%</span><span class="up">${fmt(penBenefit.credit)}</span></div>
      <div class="TXR"><span>הערכת מס</span><span style="font-weight:700">${fmt(iEAfterCredit)}</span></div>
      <div class="TXR"><span>שולם</span><span class="up">${fmt(iP)}</span></div>
      <div class="TXR"><span>יתרה</span><span class="${bc(iEAfterCredit-iP)}">${fmt(iEAfterCredit-iP)} (${bt(iEAfterCredit-iP)})</span></div>
    </div>
    <div class="TXC"><h4>🏥 ביט"ל + בריאות</h4>
      <div class="TXR"><span>הכנסה חייבת</span><span>${fmt(baseIncome)}</span></div>
      <div class="TXR"><span>עד 60% שכר ממוצע</span><span style="font-size:7px">${Math.round(NI_RATE_LOW*100)}% על ${fmt(NI_ANNUAL_60PCT)}</span></div>
      <div class="TXR"><span>מעל 60% שכר ממוצע</span><span style="font-size:7px">${Math.round(NI_RATE_HIGH*100)}% על יתרה</span></div>
      <div class="TXR"><span>הערכה</span><span>${fmt(bE)}</span></div>
      <div class="TXR"><span>שולם</span><span class="up">${fmt(bP)}</span></div>
      <div class="TXR"><span>יתרה</span><span class="${bc(bE-bP)}">${fmt(bE-bP)} (${bt(bE-bP)})</span></div>
    </div>
    <div class="TXC"><h4>📊 סיכום כולל</h4>
      <div class="TXR"><span>חובה כולל</span><span>${fmt(vE+iEAfterCredit+bE)}</span></div>
      <div class="TXR"><span>שולם כולל</span><span class="up">${fmt(vP+iP+bP)}</span></div>
      <div class="TXR"><span>יתרה</span><span class="${bc(vE+iEAfterCredit+bE-vP-iP-bP)}" style="font-size:12px">${fmt(vE+iEAfterCredit+bE-vP-iP-bP)}</span></div>
      <hr class="sep">
      <div class="TXR"><span>שיעור מס אפקטיבי</span><span style="font-weight:700">${incBeforeVAT>0?((iEAfterCredit+bE)/incBeforeVAT*100).toFixed(1)+'%':'—'}</span></div>
      <div class="TXR"><span>נטו אחרי הכל</span><span class="up" style="font-size:12px">${fmt(incBeforeVAT-recBeforeVAT-iEAfterCredit-bE)}</span></div>
    </div>
  </div>

  <div class="E"><div class="ET">📊 מדרגות מס 2026</div><div class="ES">חוק ההתייעלות הכלכלית — מדרגות 3-5 הורחבו רטרואקטיבית</div>
    <div class="TS"><table><thead><tr><th>מדרגה</th><th>מ-</th><th>עד</th><th>שיעור</th><th>מס מצטבר</th></tr></thead><tbody>
    ${BRK.filter(b=>b.u!==Infinity).map((b,i)=>{
      const from=i===0?0:BRK[i-1].u;
      let cumTax=0,p2=0;
      for(let j=0;j<=i;j++){const x=Math.min(BRK[j].u)-p2;cumTax+=x*BRK[j].r;p2=BRK[j].u;}
      const active=taxableIncome>from;
      return`<tr style="${active?'':'opacity:.4'}"><td class="tn">${i+1}</td><td>${fmt(from)}</td><td>${fmt(b.u)}</td><td>${Math.round(b.r*100)}%</td><td>${fmt(cumTax)}</td></tr>`;
    }).join('')}
    <tr style="${taxableIncome>721560?'':'opacity:.4'}"><td class="tn">מס יסף</td><td>${fmt(721560)}</td><td>∞</td><td>3% (פעיל)</td><td>—</td></tr>
    </tbody></table></div>
  </div>

  <div class="E"><div class="ET">+ תשלום מס</div><div class="FG"><div class="FR"><label class="FL">חודש</label><select class="FI" id="txM">${ks().map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select></div><div class="FR"><label class="FL">סוג</label><select class="FI" id="txT">${TXT.map(t=>`<option value="${t.id}">${t.i} ${t.n}</option>`).join('')}</select></div><div class="FR"><label class="FL">סכום</label><input type="number" class="FI" id="txA"></div></div><div class="FA"><button class="B Ba" onclick="addTX()">+</button></div></div>
  <div class="E"><div class="ET">תשלומים</div><div class="LI" id="txL"></div></div>`;
  if(ks().length)$('txM').value=ks().slice(-1)[0];rTXL();}

function addTX(){const m=$('txM').value,t=$('txT').value,a=+$('txA').value;if(!m||!a)return;S.taxPayments.push({id:Date.now(),month:m,type:t,amount:a});if(S.months[m])S.months[m]['עובר ושב']=(S.months[m]['עובר ושב']||0)-a;save();renderTax()}
function delTX(id){const p=S.taxPayments.find(x=>x.id===id);if(!p||!confirm('למחוק?'))return;if(S.months[p.month])S.months[p.month]['עובר ושב']+=p.amount;S.taxPayments=S.taxPayments.filter(x=>x.id!==id);save();renderTax()}
function rTXL(){const el=$('txL');if(!el)return;el.innerHTML=[...(S.taxPayments||[])].sort((a,b)=>(b.month||'').localeCompare(a.month||'')||b.id-a.id).slice(0,40).map(p=>{const t=TXT.find(x=>x.id===p.type);return`<div class="LT"><span class="ld">${ms(p.month)}</span><span class="tg tg-p">${t?t.n:p.type}</span><span class="lv dn">${fmt(p.amount)}</span><button class="B Bd" onclick="delTX(${p.id})" style="padding:0 2px;font-size:7px">✕</button></div>`}).join('')||'<p style="color:var(--c3);font-size:8px">אין</p>'}

// ===== DEPOSITS (NEW TAB) =====
function renderDeposits(){
  const tc=S.taxConfig||{};
  const yr=new Date().getFullYear().toString();
  const yDep=(S.deposits||[]).filter(d=>d.month&&d.month.startsWith(yr));
  const penDep=yDep.filter(d=>d.type==='pension').reduce((s,d)=>s+d.amount,0);
  const hashDep=yDep.filter(d=>d.type==='hishtalmut').reduce((s,d)=>s+d.amount,0);
  const savDep=yDep.filter(d=>d.type==='savings').reduce((s,d)=>s+d.amount,0);
  
  const cats=dcs().filter(c=>c!=='עובר ושב'&&c!=='פיקדון אישי');
  const el=$('p-deposits');
  
  el.innerHTML=`
  <div class="tip">
    💡 <strong>הגדר הפקדות חודשיות:</strong> פנסיה (ניכוי סעיף 47 + זיכוי 35%), השתלמות (ניכוי סעיף 45א עד 4.5%), וחיסכון כללי.
    ההפקדות יופיעו אוטומטית בחישוב המס ובמעקב ההפקדות.
  </div>
  
  <div class="E"><div class="ET">⚙️ הגדרות הפקדות ומס</div>
    <div class="FG">
      <div class="FR"><label class="FL">נקודות זיכוי</label><input type="number" step="0.25" class="FI" id="dcNek" value="${tc.nekudot||2.25}" placeholder="2.25"></div>
      <div class="FR"><label class="FL">מין</label><select class="FI" id="dcGen"><option value="male" ${tc.gender==='male'?'selected':''}>זכר (2.25 בסיס)</option><option value="female" ${tc.gender==='female'?'selected':''}>נקבה (2.75 בסיס)</option></select></div>
      <div class="FR"><label class="FL">פנסיה — חודשי ₪</label><input type="number" class="FI" id="dcPen" value="${tc.pensionMonthly||0}"></div>
      <div class="FR"><label class="FL">יעד פנסיה</label><select class="FI" id="dcPenT">${cats.map(c=>`<option value="${c}" ${tc.pensionTarget===c?'selected':''}>${sh(c)}</option>`).join('')}</select></div>
      <div class="FR"><label class="FL">השתלמות — חודשי ₪</label><input type="number" class="FI" id="dcHash" value="${tc.hashMonthly||0}"></div>
      <div class="FR"><label class="FL">יעד השתלמות</label><select class="FI" id="dcHashT">${cats.map(c=>`<option value="${c}" ${tc.hashTarget===c?'selected':''}>${sh(c)}</option>`).join('')}</select></div>
      <div class="FR"><label class="FL">חיסכון — חודשי ₪</label><input type="number" class="FI" id="dcSav" value="${tc.savingsMonthly||0}"></div>
      <div class="FR"><label class="FL">יעד חיסכון</label><select class="FI" id="dcSavT">${cats.map(c=>`<option value="${c}" ${tc.savingsTarget===c?'selected':''}>${sh(c)}</option>`).join('')}</select></div>
    </div>
    <div class="FA">
      <button class="B Ba" onclick="saveTaxConfig()">💾 שמור הגדרות</button>
      <span class="SI" id="dcSv">✓ נשמר</span>
    </div>
  </div>

  <div class="E"><div class="ET">💰 הפקדה חדשה</div><div class="ES">הפקדה ידנית — פנסיה, השתלמות, או חיסכון כללי</div>
    <div class="FG">
      <div class="FR"><label class="FL">חודש</label><select class="FI" id="dpM">${ks().map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select></div>
      <div class="FR"><label class="FL">סוג</label><select class="FI" id="dpT"><option value="pension">🏦 פנסיה</option><option value="hishtalmut">📚 השתלמות</option><option value="savings">💰 חיסכון</option></select></div>
      <div class="FR"><label class="FL">סכום</label><input type="number" class="FI" id="dpA"></div>
      <div class="FR"><label class="FL">יעד</label><select class="FI" id="dpDest">${cats.map(c=>`<option value="${c}">${sh(c)}</option>`).join('')}</select></div>
    </div>
    <div class="FA"><button class="B Ba" onclick="addDeposit()">+ הפקד</button></div>
  </div>

  <div class="E"><div class="ET">⚡ הפקדה אוטומטית</div><div class="ES">יוצר הפקדות לכל חודש שנבחר לפי ההגדרות למעלה</div>
    <div class="FG">
      <div class="FR"><label class="FL">מחודש</label><select class="FI" id="adFrom">${ks().map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select></div>
      <div class="FR"><label class="FL">עד חודש</label><select class="FI" id="adTo">${ks().map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select></div>
    </div>
    <div class="FA"><button class="B Ba" onclick="autoDeposit()">⚡ צור הפקדות אוטומטיות</button></div>
  </div>

  <div class="CG">
    <div class="CD"><div class="CS" style="background:var(--bl)"></div><div class="CL">🏦 פנסיה ${yr}</div><div class="CV">${fmt(penDep)}</div></div>
    <div class="CD"><div class="CS" style="background:var(--pr)"></div><div class="CL">📚 השתלמות ${yr}</div><div class="CV">${fmt(hashDep)}</div></div>
    <div class="CD"><div class="CS" style="background:var(--gn)"></div><div class="CL">💰 חיסכון ${yr}</div><div class="CV">${fmt(savDep)}</div></div>
    <div class="CD"><div class="CS" style="background:var(--ac)"></div><div class="CL">סה"כ הופקד ${yr}</div><div class="CV">${fmt(penDep+hashDep+savDep)}</div></div>
  </div>

  <div class="E"><div class="ET">היסטוריית הפקדות</div><div class="LI" id="dpL"></div></div>`;

    $('adTo').value=ks().slice(-1)[0];
  }

}

function saveTaxConfig(){
  S.taxConfig={
    nekudot:+$('dcNek').value||2.25,
    gender:$('dcGen').value,
    pensionMonthly:+$('dcPen').value||0,
    hashMonthly:+$('dcHash').value||0,
    pensionTarget:$('dcPenT').value,
    hashTarget:$('dcHashT').value,
    savingsMonthly:+$('dcSav').value||0,
    savingsTarget:$('dcSavT').value,
    autoDeposit:true
  };
  save();
  $('dcSv').classList.add('sh');setTimeout(()=>$('dcSv').classList.remove('sh'),1500);
}

function addDeposit(){
  const m=$('dpM').value,t=$('dpT').value,a=+$('dpA').value,dest=$('dpDest').value;
  if(!m||!a)return;
  S.deposits.push({id:Date.now(),month:m,type:t,amount:a,dest});
  // Update the target account's balance and the osh
  if(S.months[m]){
    S.months[m]['עובר ושב']=(S.months[m]['עובר ושב']||0)-a;
    S.months[m][mb(dest)]=(S.months[m][mb(dest)]||0)+a;
  }
  // Update deposited amount in accounts
  if(!S.accounts[dest])S.accounts[dest]={dep:0,fd:0,fs:0};
  S.accounts[dest].dep=(S.accounts[dest].dep||0)+a;
  save();$('dpA').value='';renderDeposits();
}

function autoDeposit(){
  const from=$('adFrom').value,to=$('adTo').value;
  const tc=S.taxConfig||{};
  if(!from||!to||!tc.pensionMonthly&&!tc.hashMonthly&&!tc.savingsMonthly){
    alert('הגדר סכומי הפקדה חודשיים קודם');return;
  }
  const months=ks().filter(k=>k>=from&&k<=to);
  let count=0;
  months.forEach(m=>{
    // Check if already has deposits for this month
    const existing=(S.deposits||[]).filter(d=>d.month===m);
    
    if(tc.pensionMonthly>0 && !existing.find(d=>d.type==='pension')){
      S.deposits.push({id:Date.now()+count,month:m,type:'pension',amount:tc.pensionMonthly,dest:tc.pensionTarget||'פנסיה'});
      count++;
    }
    if(tc.hashMonthly>0 && !existing.find(d=>d.type==='hishtalmut')){
      S.deposits.push({id:Date.now()+count,month:m,type:'hishtalmut',amount:tc.hashMonthly,dest:tc.hashTarget||'השתלמות'});
      count++;
    }
    if(tc.savingsMonthly>0 && !existing.find(d=>d.type==='savings')){
      S.deposits.push({id:Date.now()+count,month:m,type:'savings',amount:tc.savingsMonthly,dest:tc.savingsTarget||'קרן כספית'});
      count++;
    }
  });
  if(count>0){save();alert(`נוצרו ${count} הפקדות`);}else{alert('כל ההפקדות כבר קיימות');}
  renderDeposits();
}

function delDeposit(id){
  const d=S.deposits.find(x=>x.id===id);
  if(!d||!confirm('למחוק הפקדה?'))return;
  // Reverse the balance changes
  if(S.months[d.month]){
    S.months[d.month]['עובר ושב']=(S.months[d.month]['עובר ושב']||0)+d.amount;
    if(d.dest)S.months[d.month][mb(d.dest)]=(S.months[d.month][mb(d.dest)]||0)-d.amount;
  }
  if(d.dest&&S.accounts[d.dest]){
    S.accounts[d.dest].dep=Math.max(0,(S.accounts[d.dest].dep||0)-d.amount);
  }
  S.deposits=S.deposits.filter(x=>x.id!==id);
  save();renderDeposits();
}

function rDPL(){
  const el=$('dpL');if(!el)return;
  const typeNames={pension:'🏦 פנסיה',hishtalmut:'📚 השתלמות',savings:'💰 חיסכון'};
  el.innerHTML=[...(S.deposits||[])].sort((a,b)=>(b.month||'').localeCompare(a.month||'')||b.id-a.id).slice(0,60).map(d=>{
    return`<div class="LT"><span class="ld">${ms(d.month)}</span><span class="tg tg-o">${typeNames[d.type]||d.type}</span><span class="lt">${d.dest?sh(d.dest):''}</span><span class="lv">${fmt(d.amount)}</span><button class="B Bd" onclick="delDeposit(${d.id})" style="padding:0 2px;font-size:7px">✕</button></div>`;
  }).join('')||'<p style="color:var(--c3);font-size:8px">אין הפקדות</p>';
}

// ===== ENTRY =====
function renderEntry(){const K=ks();$('p-entry').innerHTML=`<div class="E"><div class="ET">✏️ יתרות</div><div class="ES">בחר חודש קיים או הוסף חדש</div><div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap"><select class="FI" id="eM" style="min-width:110px">${K.map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select><input type="month" class="FI" id="eN" style="min-width:110px;direction:ltr"><button class="B" onclick="addMo()">+ חודש</button></div><div class="FG" id="eF"></div><div class="FA"><button class="B Ba" onclick="svMo()">💾</button><button class="B Bd" onclick="dlMo()">🗑️</button><span class="SI" id="sv">✓</span></div></div>`;if(K.length){$('eM').value=K[K.length-1];ldM()}$('eM').onchange=ldM}
function ldM(){const k=$('eM').value;if(!k)return;const d=S.months[k]||{};$('eF').innerHTML=(S.cats||[]).map(c=>`<div class="FR"><label class="FL">${c}</label><input type="number" class="FI" data-c="${c}" value="${d[c]||''}" placeholder="0"></div>`).join('')}
function svMo(){const k=$('eM').value;if(!k)return;if(!S.months[k])S.months[k]={};document.querySelectorAll('#eF input[data-c]').forEach(i=>{S.months[k][i.dataset.c]=+i.value||0});save();$('sv').classList.add('sh');setTimeout(()=>$('sv').classList.remove('sh'),1500)}
function addMo(){let v=$('eN').value;if(!v){const K=ks();if(K.length){const[y,m]=K[K.length-1].split('-').map(Number);let nm=m+1,ny=y;if(nm>12){nm=1;ny++}v=ny+'-'+String(nm).padStart(2,'0')}else{const n=new Date();v=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')}}if(S.months[v])return alert('קיים');S.months[v]={};save();renderEntry();$('eM').value=v;ldM()}
function dlMo(){const k=$('eM').value;if(!k||!confirm(`למחוק ${ml(k)}?`))return;delete S.months[k];S.incomes=(S.incomes||[]).filter(i=>i.month!==k);S.expenses=(S.expenses||[]).filter(e=>e.month!==k);S.transfers=(S.transfers||[]).filter(t=>t.month!==k);S.taxPayments=(S.taxPayments||[]).filter(p=>p.month!==k);S.deposits=(S.deposits||[]).filter(d=>d.month!==k);save();renderEntry()}

// ===== ACCOUNTS =====
function renderAcct(){$('p-acct').innerHTML=`<div class="E"><div class="ET">🏦 חשבונות — סה"כ הופקד + דמ"נ</div><div class="ES">רווח = ערך נוכחי - הופקד. מס אוטומטי.</div><div class="TS"><table><thead><tr><th>חיסכון</th><th>הופקד ₪</th><th>דמ"נ הפקדה %</th><th>דמ"נ צבירה %</th></tr></thead><tbody>${dcs().filter(c=>c!=='עובר ושב').map(c=>{const a=S.accounts[c]||{};return`<tr><td class="tn">${sh(c)}</td><td><input type="number" class="FI" data-ac="${c}" data-f="dep" value="${a.dep||''}" style="width:90px"></td><td><input type="number" step=".01" class="FI" data-ac="${c}" data-f="fd" value="${a.fd||''}" style="width:60px"></td><td><input type="number" step=".01" class="FI" data-ac="${c}" data-f="fs" value="${a.fs||''}" style="width:60px"></td></tr>`}).join('')}</tbody></table></div><div class="FA"><button class="B Ba" onclick="svAc()">💾</button></div></div>
  <div class="E"><div class="ET">➕ חיסכון חדש</div><div style="display:flex;gap:4px"><input class="FI" id="ncI" placeholder="שם" style="direction:rtl;text-align:right;max-width:160px"><button class="B Ba" onclick="addCat()">+</button></div></div>`}
function svAc(){document.querySelectorAll('[data-ac]').forEach(i=>{const c=i.dataset.ac,f=i.dataset.f;if(!S.accounts[c])S.accounts[c]={dep:0,fd:0,fs:0};S.accounts[c][f]=+i.value||0});save()}
function addCat(){const n=$('ncI').value.trim();if(!n||(S.cats||[]).includes(n))return;S.cats.push(n);S.accounts[n]={dep:0,fd:0,fs:0};save();$('ncI').value='';renderAcct()}

// ===== TRANSFERS =====
function renderTr(){const cats=dcs().filter(c=>c!=='פיקדון אישי');$('p-transfer').innerHTML=`<div class="E"><div class="ET">🔄 העברה</div><div class="FG"><div class="FR"><label class="FL">חודש</label><select class="FI" id="tM">${ks().map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select></div><div class="FR"><label class="FL">מ</label><select class="FI" id="tF">${cats.map(c=>`<option value="${c}">${sh(c)}</option>`).join('')}</select></div><div class="FR"><label class="FL">ל</label><select class="FI" id="tT">${cats.map((c,i)=>`<option value="${c}" ${i===4?'selected':''}>${sh(c)}</option>`).join('')}</select></div><div class="FR"><label class="FL">סכום</label><input type="number" class="FI" id="tA"></div></div><div class="FA"><button class="B Ba" onclick="addTr()">+</button></div></div><div class="E"><div class="ET">היסטוריה</div><div class="LI" id="tL"></div></div>`;if(ks().length)$('tM').value=ks().slice(-1)[0];rTL()}
function addTr(){const m=$('tM').value,f=$('tF').value,t=$('tT').value,a=+$('tA').value;if(!m||!f||!t||f===t||!a)return;S.transfers.push({id:Date.now(),month:m,from:f,to:t,amount:a});if(S.months[m]){S.months[m][mb(f)]=(S.months[m][mb(f)]||0)-a;S.months[m][mb(t)]=(S.months[m][mb(t)]||0)+a}save();$('tA').value='';rTL()}
function delTr(id){const t=S.transfers.find(x=>x.id===id);if(!t||!confirm('למחוק?'))return;if(S.months[t.month]){S.months[t.month][mb(t.from)]+=t.amount;S.months[t.month][mb(t.to)]-=t.amount}S.transfers=S.transfers.filter(x=>x.id!==id);save();rTL()}
function rTL(){const el=$('tL');if(!el)return;el.innerHTML=[...(S.transfers||[])].sort((a,b)=>b.id-a.id).map(t=>`<div class="LT"><span class="ld">${ms(t.month)}</span><span class="lt">${sh(t.from)} → ${sh(t.to)}</span><span class="lv">${fmt(t.amount)}</span><button class="B Bd" onclick="delTr(${t.id})" style="padding:0 2px;font-size:7px">✕</button></div>`).join('')||'<p style="color:var(--c3);font-size:8px">אין</p>'}

// ===== SETTINGS =====
function renderSet(){$('p-set').innerHTML=`<div class="E"><div class="ET">ייצוא/ייבוא</div><div style="display:flex;gap:4px"><button class="B" onclick="let b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='finboard_'+new Date().toISOString().slice(0,10)+'.json';a.click()">📤 ייצוא</button><button class="B" onclick="$('impI').click()">📥 ייבוא</button><input type="file" id="impI" accept=".json" style="display:none" onchange="let r=new FileReader();r.onload=e=>{try{S=JSON.parse(e.target.result);save()}catch(x){alert(x)}};r.readAsText(this.files[0])"></div></div>
  <div class="E"><div class="ET">📋 גרסה</div><div class="ES">FinBoard v2 — מדרגות מס 2026, ביט"ל דו-שלבי, נקודות זיכוי, ניכויי פנסיה/השתלמות (47/45א), הפקדות אוטומטיות</div></div>
  <div class="E"><div class="ET">⚠️ איפוס</div><button class="B Bd" onclick="$('rstM').classList.add('op')">מחק את כל הנתונים</button></div>`}

// ===== NAV =====
function togTh(){S.theme=document.body.dataset.theme==='dark'?'light':'dark';document.body.dataset.theme=S.theme;$('thB').textContent=S.theme==='dark'?'🌙':'☀️';save()}
const pages={dash:renderDash,biz:renderBiz,tax:renderTax,deposits:renderDeposits,entry:renderEntry,acct:renderAcct,transfer:renderTr,set:renderSet};
document.querySelectorAll('.N button').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.N button').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.P').forEach(x=>x.classList.remove('on'));b.classList.add('on');$('p-'+b.dataset.t).classList.add('on');curT=b.dataset.t;pages[curT]()}});
</script>
